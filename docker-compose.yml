x-llm-api-keys: &llm-api-keys
  LAZYLLM_OPENAI_API_KEY: ${LAZYLLM_OPENAI_API_KEY:-}
  LAZYLLM_GLM_API_KEY: ${LAZYLLM_GLM_API_KEY:-}
  LAZYLLM_QWEN_API_KEY: ${LAZYLLM_QWEN_API_KEY:-}
  LAZYLLM_SENSENOVA_API_KEY: ${LAZYLLM_SENSENOVA_API_KEY:-}
  LAZYLLM_SENSENOVA_SECRET_KEY: ${LAZYLLM_SENSENOVA_SECRET_KEY:-}
  LAZYLLM_KIMI_API_KEY: ${LAZYLLM_KIMI_API_KEY:-}
  LAZYLLM_DEEPSEEK_API_KEY: ${LAZYLLM_DEEPSEEK_API_KEY:-}
  LAZYLLM_DOUBAO_API_KEY: ${LAZYLLM_DOUBAO_API_KEY:-}
  LAZYLLM_SILICONFLOW_API_KEY: ${LAZYLLM_SILICONFLOW_API_KEY:-}
  LAZYLLM_MINIMAX_API_KEY: ${LAZYLLM_MINIMAX_API_KEY:-}
  LAZYLLM_AIPING_API_KEY: ${LAZYLLM_AIPING_API_KEY:-}

services:

  kong:
    # Use build: ./kong if the default image fails with "module 'resty.http' not found"
    image: kong:3.6
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_PLUGINS: bundled,rbac-auth
    volumes:
      - ./kong.yml:/kong/kong.yml
      - ./kong/plugins/rbac-auth:/usr/local/share/lua/5.1/kong/plugins/rbac-auth
    ports:
      - "8000:8000"
    depends_on:
      auth-service:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 3s
      retries: 20

  auth-service:
    build:
      network: host
      context: ./backend
      dockerfile: auth-service/Dockerfile
    expose:
      - "8000"
    environment:
      LAZYRAG_DATABASE_URL: postgresql+psycopg://app:app@db:5432/app
      LAZYRAG_JWT_SECRET: dev-secret-change-me
      LAZYRAG_JWT_TTL_MINUTES: "60"
      LAZYRAG_JWT_REFRESH_TTL_DAYS: "7"
      LAZYRAG_BOOTSTRAP_ADMIN_USERNAME: admin
      LAZYRAG_BOOTSTRAP_ADMIN_PASSWORD: admin
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/auth/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      db:
        condition: service_healthy

  core:
    build:
      network: host
      context: ./backend
      dockerfile: core/Dockerfile
    expose:
      - "8000"
    environment:
      ACL_DB_DRIVER: postgres
      ACL_DB_DSN: "host=db user=app password=app dbname=app port=5432 sslmode=disable TimeZone=UTC"
      LAZYRAG_PARSING_SERVICE_URL: http://parsing:8000
      LAZYRAG_PROCESSOR_SERVICE_URL: http://processor-server:8001
      LAZYRAG_CHAT_SERVICE_URL: http://chat:8046
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      db:
        condition: service_healthy
      auth-service:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "8090:80"
    environment:
      FRONTEND_API_PROXY_PASS: ${FRONTEND_API_PROXY_PASS:-http://kong:8000}
      FRONTEND_API_DOCS_PROXY_PASS: ${FRONTEND_API_DOCS_PROXY_PASS:-http://kong:8000}

  # ---------- Algorithm stack: MinerU/PaddleOCR -> Processor (server + worker) <-> Parsing (Document) <- Chat ----------
  # Base image (lazyllm[rag]==0.7.6a0) is shared; mineru adds mineru[all], others use base+code only.
  mineru:
    profiles:
      - mineru
    build:
      network: host
      context: ./algorithm
      dockerfile: Dockerfile
      target: mineru
    expose:
      - "8000"
    environment:
      <<: *llm-api-keys
      LAZYRAG_MINERU_SERVER_PORT: "8000"
    command: ["python", "parsing/mineru.py"]

  # PaddleOCR-VL document parsing service (official images).
  # See: https://www.paddleocr.ai/main/version3.x/pipeline_usage/PaddleOCR-VL.html Section 4
  paddleocr-vlm-server:
    profiles:
      - paddleocr
    image: ccr-2vdh3abv-pub.cnc.bj.baidubce.com/paddlepaddle/paddleocr-genai-vllm-server:${PADDLEOCR_VLM_IMAGE_TAG:-latest-nvidia-gpu}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    command:
      - /bin/bash
      - -c
      - |
        paddleocr genai_server \
          --model_name PaddleOCR-VL-1.5-0.9B \
          --backend vllm \
          --host 0.0.0.0 \
          --port 8118
    user: root
    restart: unless-stopped
    shm_size: '16gb'
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8118/health || exit 1']
      start_period: 120s

  paddleocr:
    profiles:
      - paddleocr
    image: ccr-2vdh3abv-pub.cnc.bj.baidubce.com/paddlepaddle/paddleocr-vl:${PADDLEOCR_API_IMAGE_TAG:-latest-nvidia-gpu}
    expose:
      - '8080'
    depends_on:
      paddleocr-vlm-server:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    environment:
      - VLM_BACKEND=${PADDLEOCR_VLM_BACKEND:-vllm}
      - VL_REC_SERVER_URL=http://paddleocr-vlm-server:8118/v1
    command:
      - /bin/bash
      - -c
      - 'paddlex --serve --pipeline /home/paddleocr/pipeline_config_$${VLM_BACKEND}.yaml'
    user: root
    restart: unless-stopped

  processor-server:
    build:
      network: host
      context: ./algorithm
      dockerfile: Dockerfile
      target: default
    expose:
      - "8000"
      - "8001"
    volumes:
      - rag-uploads:/app/uploads
    environment:
      LAZYRAG_DOCUMENT_PROCESSOR_PORT: "8000"
      LAZYRAG_UPLOAD_SERVER_PORT: "8001"
      LAZYRAG_UPLOAD_DIR: /app/uploads
      LAZYRAG_DOC_TASK_DATABASE_URL: postgresql+psycopg://app:app@db:5432/app
      LAZYLLM_EXPECTED_LOG_MODULES: "all"
      <<: *llm-api-keys
    command: ["python", "processor/server.py"]
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8000/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      db:
        condition: service_healthy

  processor-worker:
    build:
      network: host
      context: ./algorithm
      dockerfile: Dockerfile
      target: default
    volumes:
      - rag-uploads:/app/uploads
    environment:
      LAZYRAG_DOCUMENT_WORKER_PORT: "8001"
      LAZYRAG_DOC_TASK_DATABASE_URL: postgresql+psycopg://app:app@db:5432/app
      LAZYLLM_EXPECTED_LOG_MODULES: "all"
      <<: *llm-api-keys
    command: ["python", "processor/worker.py"]
    depends_on:
      db:
        condition: service_healthy
      processor-server:
        condition: service_healthy

  parsing:
    build:
      network: host
      context: ./algorithm
      dockerfile: Dockerfile
      target: default
    expose:
      - "8000"
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:8000/docs || exit 1']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    environment:
      LAZYRAG_DOCUMENT_PROCESSOR_URL: http://processor-server:8000
      LAZYRAG_DOCUMENT_SERVER_PORT: "8000"
      LAZYRAG_OCR_SERVER_TYPE: ${LAZYRAG_OCR_SERVER_TYPE:-none}
      # Use neutral default; when mineru/paddleocr, set LAZYRAG_OCR_SERVER_URL (or use Makefile which sets it).
      # Avoid hardcoding mineru URL here to prevent paddleocr misconfiguration.
      LAZYRAG_OCR_SERVER_URL: ${LAZYRAG_OCR_SERVER_URL:-http://localhost:8000}
      LAZYRAG_MILVUS_URI: ${LAZYRAG_MILVUS_URI:-http://milvus:19530}
      LAZYRAG_OPENSEARCH_URI: ${LAZYRAG_OPENSEARCH_URI:-https://opensearch:9200}
      LAZYRAG_OPENSEARCH_USER: ${LAZYRAG_OPENSEARCH_USER:-admin}
      LAZYRAG_OPENSEARCH_PASSWORD: ${LAZYRAG_OPENSEARCH_PASSWORD:-admin}
      <<: *llm-api-keys
    command: ["python", "parsing/parsing.py"]
    depends_on:
      processor-server:
        condition: service_healthy
      processor-worker:
        condition: service_started

  chat:
    build:
      network: host
      context: ./algorithm
      dockerfile: Dockerfile
      target: default
    expose:
      - "8046"
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:8046/docs || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      LAZYRAG_DOCUMENT_SERVER_URL: http://parsing:8000
      LAZYRAG_MAX_CONCURRENCY: "10"
      LAZYRAG_LLM_PRIORITY: "0"
      <<: *llm-api-keys
    command: ["python", "chat/chat.py", "--port", "8046"]
    depends_on:
      parsing:
        condition: service_healthy

  # ---------- Vector store: Milvus standalone (profile: milvus) ----------
  milvus-etcd:
    profiles:
      - milvus
    image: quay.io/coreos/etcd:v3.5.25
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - milvus-etcd:/etcd
    command: etcd -advertise-client-urls=http://milvus-etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ['CMD', 'etcdctl', 'endpoint', 'health']
      interval: 30s
      timeout: 20s
      retries: 3

  milvus-minio:
    profiles:
      - milvus
    image: minio/minio:RELEASE.2024-05-28T17-19-04Z
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - milvus-minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    # Healthcheck disabled: newer MinIO images lack curl; use service_started in milvus depends_on

  milvus:
    profiles:
      - milvus
    image: milvusdb/milvus:${MILVUS_IMAGE_TAG:-v2.6.11}
    command: ['sh', '-c', 'sleep 15 && exec milvus run standalone']
    # seccomp:unconfined removed for security; add back if Milvus fails on your platform
    environment:
      MINIO_REGION: us-east-1
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
      MINIO_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY}
    volumes:
      - milvus-data:/var/lib/milvus
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9091/healthz']
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    expose:
      - '19530'
    ports:
      - '19530:19530'
    depends_on:
      milvus-etcd:
        condition: service_healthy
      milvus-minio:
        condition: service_started

  # ---------- Segment store: OpenSearch single-node (profile: opensearch) ----------
  opensearch:
    profiles:
      - opensearch
    image: opensearchproject/opensearch:${OPENSEARCH_IMAGE_TAG:-2.18.0}
    container_name: opensearch
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch-node1
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${LAZYRAG_OPENSEARCH_PASSWORD:-LazyRAG_OpenSearch123!}
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -s -k -u admin:"$$OPENSEARCH_INITIAL_ADMIN_PASSWORD" https://localhost:9200/_cluster/health | grep -q "\"status\":\"green\"\\|\"status\":\"yellow\""']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    expose:
      - '9200'
    ports:
      - '9200:9200'
      - '9600:9600'

volumes:
  pgdata:
  rag-uploads:
  milvus-etcd:
  milvus-minio:
  milvus-data:
  opensearch-data:
