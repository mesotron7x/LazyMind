server {
    listen 80;
    resolver 127.0.0.11 valid=10s;
    client_max_body_size 1024m;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_connect_timeout 60s;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Use /api/ (trailing slash) so /api-docs/* is not matched and goes to api-docs proxies
    location /api/ {
        proxy_pass http://kong:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy only openapi.json for API docs (avoids bypassing Kong auth for other endpoints)
    location = /api-docs/core/openapi.json {
        proxy_pass http://core:8000/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location = /api-docs/auth-service/openapi.json {
        proxy_pass http://auth-service:8000/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location = /api-docs/processor-server/openapi.json {
        proxy_pass http://processor-server:8000/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location = /api-docs/processor-worker/openapi.json {
        proxy_pass http://processor-worker:8001/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location = /api-docs/parsing/openapi.json {
        proxy_pass http://parsing:8000/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location = /api-docs/chat/openapi.json {
        proxy_pass http://chat:8046/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}