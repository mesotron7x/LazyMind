                  schema:
                    type: string
                - in: query
                  name: override
                  schema:
                    default: false
                    type: boolean
            requestBody:
                content:
                    multipart/form-data:
                        schema:
                            properties:
                                files:
                                    items:
                                        format: binary
                                        type: string
                                    type: array
                            type: object
            responses:
                "200":
                    description: Returns file ids
            summary: Upload files and add to knowledge base group
    /api/core/admin:
        get:
