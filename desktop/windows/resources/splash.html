<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-app-region: drag;
    }
    .container {
      min-width: 320px;
      text-align: center;
      background: rgba(255, 255, 255, 0.96);
      border-radius: 16px;
      padding: 24px 44px 26px;
      box-shadow: 0 8px 32px rgba(15, 23, 42, 0.14);
    }
    .logo {
      display: block;
      width: 108px;
      height: 108px;
      object-fit: contain;
      margin: 0 auto 14px;
      -webkit-user-drag: none;
    }
    .title {
      font-size: 24px;
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 18px;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #e5e7eb;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <img class="logo" src="icons/icon.png" alt="LazyMind">
    <div class="title">LazyMind</div>
    <div class="subtitle">正在启动本地服务...</div>
    <div class="spinner"></div>
  </div>
</body>
</html>
