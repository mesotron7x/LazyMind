<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-app-region: drag;
    }
    .container {
      width: 360px;
      text-align: left;
      background: rgba(255, 255, 255, 0.96);
      border-radius: 16px;
      padding: 20px 28px 22px;
      box-shadow: 0 8px 32px rgba(15, 23, 42, 0.14);
    }
    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }
    .logo {
      display: block;
      width: 74px;
      height: 74px;
      object-fit: contain;
      -webkit-user-drag: none;
    }
    .title {
      font-size: 24px;
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 14px;
      color: #64748b;
    }
    .progress-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 7px;
      font-size: 12px;
      color: #64748b;
    }
    .progress-track {
      height: 5px;
      overflow: hidden;
      border-radius: 999px;
      background: #e5e7eb;
      margin-bottom: 13px;
    }
    .progress-bar {
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: #2563eb;
      transition: width 0.2s ease;
    }
    .status-list {
      overflow: hidden;
      border-top: 1px solid #e5e7eb;
      border-bottom: 1px solid #e5e7eb;
    }
    .status-row {
      display: grid;
      grid-template-columns: 18px 64px 1fr;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      border-top: 1px solid #eef2f7;
      font-size: 13px;
      color: #334155;
    }
    .status-row:first-child {
      border-top: 0;
    }
    .status-label {
      font-weight: 600;
      color: #475569;
      white-space: nowrap;
    }
    .status-value {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .status-row.current .status-label,
    .status-row.current .status-value {
      color: #1d4ed8;
    }
    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      justify-self: center;
    }
    .dot.done {
      background: #16a34a;
      box-shadow: inset 0 0 0 3px #dcfce7;
    }
    .dot.pending {
      background: #cbd5e1;
      box-shadow: inset 0 0 0 3px #f1f5f9;
    }
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid #dbeafe;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      justify-self: center;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img class="logo" src="icons/icon.png" alt="LazyMind">
      <div>
        <div class="title">LazyMind</div>
        <div class="subtitle">启动中</div>
      </div>
    </div>

    <div class="progress-head">
      <span>服务准备</span>
      <span id="progressText">0/0 完成</span>
    </div>
    <div class="progress-track" aria-hidden="true">
      <div id="progressBar" class="progress-bar"></div>
    </div>

    <div class="status-list" aria-live="polite">
      <div class="status-row done">
        <span class="dot done"></span>
        <span class="status-label">已启动</span>
        <span id="startedServices" class="status-value">等待服务启动</span>
      </div>
      <div class="status-row current">
        <span class="spinner"></span>
        <span class="status-label">正在启动</span>
        <span id="currentService" class="status-value">准备启动</span>
      </div>
      <div class="status-row pending">
        <span class="dot pending"></span>
        <span class="status-label">尚未启动</span>
        <span id="pendingServices" class="status-value">读取服务清单</span>
      </div>
    </div>
  </div>
  <script>
    const serviceLabels = {
      'auth-service': 'Auth Service',
      'core': 'Core API',
      'scan-control-plane': 'Scan Control',
      'file-watcher': 'File Watcher',
      'chat': 'Chat',
      'parsing': 'Parsing',
      'processor': 'Processor',
    };

    function formatList(names, fallback) {
      if (!names.length) return fallback;
      return names.map((name) => serviceLabels[name] || name).join('、');
    }

    function updateStatus(statuses) {
      const entries = Object.values(statuses || {});
      const total = entries.length;
      const healthy = entries.filter((item) => item.state === 'healthy');
      const starting = entries.filter((item) => item.state === 'starting');
      const failed = entries.filter((item) => item.state === 'failed');
      const pending = entries.filter((item) => (
        item.state === 'pending' ||
        item.state === 'stopped' ||
        item.state === 'stopping'
      ));
      const current = failed[0] || starting[0] || pending[0];
      const completed = total ? healthy.length : 0;
      const percent = total ? Math.round((completed / total) * 100) : 0;

      document.getElementById('progressText').textContent = `${completed}/${total} 完成`;
      document.getElementById('progressBar').style.width = `${percent}%`;
      document.getElementById('startedServices').textContent = formatList(
        healthy.map((item) => item.name),
        '等待服务启动'
      );
      document.getElementById('currentService').textContent = current
        ? `${serviceLabels[current.name] || current.name}${current.state === 'failed' ? ' 启动失败' : ''}`
        : '准备启动';
      document.getElementById('pendingServices').textContent = formatList(
        pending.map((item) => item.name),
        total ? '全部已进入启动流程' : '读取服务清单'
      );
    }

    window.lazymind?.getAllServiceStatus?.().then(updateStatus).catch(() => {});
    window.lazymind?.onServiceStatusChange?.(updateStatus);
  </script>
</body>
</html>
