openapi: 3.1.0
info:
  title: Auth Service
  description: LazyRAG 认证与授权服务（登录、注册、Token、用户/角色/组管理）
  version: 1.0.0
paths:
  /api/auth/health:
    get:
      tags:
      - auth
      summary: Health
      description: 系统健康检查接口，用于监控服务存活状态
      operationId: health_api_auth_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/auth/register:
    post:
      tags:
      - auth
      summary: Register
      description: 用户注册：校验用户名、密码格式及确认密码一致后创建账号，默认角色为 user。
      operationId: register_api_auth_register_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterBody'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/auth/login:
    post:
      tags:
      - auth
      summary: Login
      description: 用户登录：校验用户名密码并通过登录失败限流后，颁发 access_token 与 refresh_token。
      operationId: login_api_auth_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginBody'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/auth/refresh:
    post:
      tags:
      - auth
      summary: Refresh
      description: 刷新 Token：用有效的 refresh_token 换取新的 access_token 与 refresh_token，旧
        refresh_token 随即失效。
      operationId: refresh_api_auth_refresh_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshBody'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/auth/validate:
    post:
      tags:
      - auth
      summary: Validate
      description: 校验 Token：验证请求头中的 Bearer token 是否有效，并返回用户 id、角色、租户及权限列表，供网关或前端做鉴权。
      operationId: validate_api_auth_validate_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateResponse'
      security:
      - HTTPBearer: []
  /api/auth/me:
    get:
      tags:
      - auth
      summary: Me
      description: 当前用户信息：根据 Bearer token 返回当前登录用户的 id、用户名、邮箱、状态、角色及权限列表。
      operationId: me_api_auth_me_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
      security:
      - HTTPBearer: []
  /api/auth/change_password:
    post:
      tags:
      - auth
      summary: Change Password
      description: 修改密码：校验旧密码后，将当前用户密码更新为新密码（新密码需符合强度要求）。
      operationId: change_password_api_auth_change_password_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordBody'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/auth/logout:
    post:
      tags:
      - auth
      summary: Logout
      description: 登出：若请求体携带 refresh_token，则服务端使该 refresh_token 失效，前端应清除本地 token。
      operationId: logout_api_auth_logout_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutBody'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/auth/authorize:
    post:
      tags:
      - authorization
      summary: Authorize
      description: "鉴权：供网关(Kong)调用，根据请求的 method、path 与用户 Bearer token 判断是否放行\n  1.\
        \ 若接口未配置所需权限则直接放行；\n  2. 否则校验用户角色与权限组，管理员或具备任一所需权限则放行；\n  3. 否则 403。"
      operationId: authorize_api_auth_authorize_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthorizeBody'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizeResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/user:
    post:
      tags:
      - user
      summary: Create User
      description: System-admin creates a user. Default role is user; can assign any
        role for high-privilege users.
      operationId: create_user_api_user_post
      security:
      - HTTPBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserBody'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateUserResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - user
      summary: List Users
      description: 分页查询用户列表，支持按关键词、租户筛选
      operationId: list_users_api_user_get
      security:
      - HTTPBearer: []
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
          title: Page
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          default: 20
          title: Page Size
      - name: search
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Search
      - name: tenant_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Tenant Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/user/{user_id}:
    patch:
      tags:
      - user
      summary: Set User Role
      description: 修改指定用户的角色
      operationId: set_user_role_api_user__user_id__patch
      security:
      - HTTPBearer: []
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          title: User Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRoleBody'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/user/{user_id}/reset_password:
    patch:
      tags:
      - user
      summary: Reset Password
      description: 重置指定用户的密码，新密码需符合强度要求
      operationId: reset_password_api_user__user_id__reset_password_patch
      security:
      - HTTPBearer: []
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          title: User Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordBody'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/role/permission-groups:
    get:
      tags:
      - role
      summary: List Permission Groups
      description: 查询所有权限组列表(id、name)，用于角色配置权限时选择
      operationId: list_permission_groups_api_role_permission_groups_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/PermissionGroupItem'
                type: array
                title: Response List Permission Groups Api Role Permission Groups
                  Get
      security:
      - HTTPBearer: []
  /api/role:
    get:
      tags:
      - role
      summary: List Roles
      description: 查询所有角色列表(id、name、built_in)
      operationId: list_roles_api_role_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/RoleItem'
                type: array
                title: Response List Roles Api Role Get
      security:
      - HTTPBearer: []
    post:
      tags:
      - role
      summary: Create Role
      description: 创建新角色，名称不可与已有角色重复
      operationId: create_role_api_role_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleCreateBody'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleCreateResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/role/{role_id}:
    delete:
      tags:
      - role
      summary: Delete Role
      description: 删除指定角色，内置角色不可删除
      operationId: delete_role_api_role__role_id__delete
      security:
      - HTTPBearer: []
      parameters:
      - name: role_id
        in: path
        required: true
        schema:
          type: string
          title: Role Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/role/{role_id}/permissions:
    get:
      tags:
      - role
      summary: Get Role Permissions
      description: 查询指定角色已绑定的权限组名称列表
      operationId: get_role_permissions_api_role__role_id__permissions_get
      security:
      - HTTPBearer: []
      parameters:
      - name: role_id
        in: path
        required: true
        schema:
          type: string
          title: Role Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RolePermissionsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - role
      summary: Set Role Permissions
      description: 设置指定角色的权限组(全量覆盖)，管理员角色不可修改
      operationId: set_role_permissions_api_role__role_id__permissions_put
      security:
      - HTTPBearer: []
      parameters:
      - name: role_id
        in: path
        required: true
        schema:
          type: string
          title: Role Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RolePermissionsBody'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/group:
    get:
      tags:
      - group
      summary: List Groups
      description: 分页查询用户组列表，支持按关键词、租户筛选
      operationId: list_groups_api_group_get
      security:
      - HTTPBearer: []
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
          title: Page
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          default: 20
          title: Page Size
      - name: search
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Search
      - name: tenant_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Tenant Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - group
      summary: Create Group
      description: 创建用户组，需填写组名、备注、租户等
      operationId: create_group_api_group_post
      security:
      - HTTPBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupCreateBody'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupCreateResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/group/{group_id}:
    get:
      tags:
      - group
      summary: Get Group
      description: 查询指定用户组详情(组名、备注、租户等)
      operationId: get_group_api_group__group_id__get
      security:
      - HTTPBearer: []
      parameters:
      - name: group_id
        in: path
        required: true
        schema:
          type: string
          title: Group Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupDetailResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - group
      summary: Update Group
      description: 更新指定用户组(组名、备注、租户)；需 user.admin(由网关鉴权)。
      operationId: update_group_api_group__group_id__patch
      security:
      - HTTPBearer: []
      parameters:
      - name: group_id
        in: path
        required: true
        schema:
          type: string
          title: Group Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupUpdateBody'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - group
      summary: Delete Group
      description: 删除指定用户组
      operationId: delete_group_api_group__group_id__delete
      security:
      - HTTPBearer: []
      parameters:
      - name: group_id
        in: path
        required: true
        schema:
          type: string
          title: Group Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/group/{group_id}/user:
    get:
      tags:
      - group
      summary: List Group Users
      description: 查询指定用户组内的成员列表(用户 id、用户名、组内角色、租户)
      operationId: list_group_users_api_group__group_id__user_get
      security:
      - HTTPBearer: []
      parameters:
      - name: group_id
        in: path
        required: true
        schema:
          type: string
          title: Group Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupUserListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - group
      summary: Add Group Users
      description: 将指定用户批量加入用户组，可指定组内角色(默认 member)，已存在则跳过
      operationId: add_group_users_api_group__group_id__user_post
      security:
      - HTTPBearer: []
      parameters:
      - name: group_id
        in: path
        required: true
        schema:
          type: string
          title: Group Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupAddUsersBody'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/group/{group_id}/user/remove:
    post:
      tags:
      - group
      summary: Remove Group Users
      description: 从用户组中批量移除指定用户
      operationId: remove_group_users_api_group__group_id__user_remove_post
      security:
      - HTTPBearer: []
      parameters:
      - name: group_id
        in: path
        required: true
        schema:
          type: string
          title: Group Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupRemoveUsersBody'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/group/{group_id}/user/{user_id}/role:
    patch:
      tags:
      - group
      summary: Set Member Role
      description: 修改指定用户在用户组内的角色
      operationId: set_member_role_api_group__group_id__user__user_id__role_patch
      security:
      - HTTPBearer: []
      parameters:
      - name: group_id
        in: path
        required: true
        schema:
          type: string
          title: Group Id
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          title: User Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupMemberRoleBody'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    AuthorizeBody:
      properties:
        method:
          type: string
          title: Method
        path:
          type: string
          title: Path
      type: object
      required:
      - method
      - path
      title: AuthorizeBody
    AuthorizeResponse:
      properties:
        allowed:
          type: boolean
          title: Allowed
      type: object
      required:
      - allowed
      title: AuthorizeResponse
      description: 鉴权结果
    ChangePasswordBody:
      properties:
        old_password:
          type: string
          title: Old Password
        new_password:
          type: string
          title: New Password
      type: object
      required:
      - old_password
      - new_password
      title: ChangePasswordBody
    CreateUserBody:
      properties:
        username:
          type: string
          title: Username
        password:
          type: string
          title: Password
        role_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Role Id
        email:
          anyOf:
          - type: string
          - type: 'null'
          title: Email
        tenant_id:
          type: string
          title: Tenant Id
          default: ''
        disabled:
          type: boolean
          title: Disabled
          default: false
      type: object
      required:
      - username
      - password
      title: CreateUserBody
    CreateUserResponse:
      properties:
        user_id:
          type: string
          title: User Id
        username:
          type: string
          title: Username
        role_id:
          type: string
          title: Role Id
        role_name:
          type: string
          title: Role Name
      type: object
      required:
      - user_id
      - username
      - role_id
      - role_name
      title: CreateUserResponse
    GroupAddUsersBody:
      properties:
        user_ids:
          items:
            type: string
          type: array
          title: User Ids
        role:
          anyOf:
          - type: string
          - type: 'null'
          title: Role
      type: object
      required:
      - user_ids
      title: GroupAddUsersBody
    GroupCreateBody:
      properties:
        group_name:
          type: string
          title: Group Name
        remark:
          anyOf:
          - type: string
          - type: 'null'
          title: Remark
        tenant_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Tenant Id
      type: object
      required:
      - group_name
      title: GroupCreateBody
    GroupCreateResponse:
      properties:
        group_id:
          type: string
          title: Group Id
      type: object
      required:
      - group_id
      title: GroupCreateResponse
      description: 创建用户组返回
    GroupDetailResponse:
      properties:
        group_id:
          type: string
          title: Group Id
        group_name:
          type: string
          title: Group Name
        remark:
          anyOf:
          - type: string
          - type: 'null'
